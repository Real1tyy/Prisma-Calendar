name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions: read-all

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm run build

      - name: Verify build output
        run: |
          test -f main.js
          test -f styles.css
          test -f manifest.json

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            styles.css
            manifest.json

      - name: Extract release notes
        id: notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # extract-changelog-entry.py exits non-zero when the version section
          # is absent — that's a fallback signal, not a failure. Guard the
          # python invocation inside the if-condition so `bash -e` doesn't
          # kill the step before we can set have_notes=0.
          if [ -f .github/scripts/extract-changelog-entry.py ] && \
             python3 .github/scripts/extract-changelog-entry.py \
               "$TAG_NAME" \
               docs-site/docs/changelog.md \
               > release-notes.md; then
            echo "have_notes=1" >> "$GITHUB_OUTPUT"
          else
            echo "have_notes=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release with assets (from changelog)
        if: steps.notes.outputs.have_notes == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes-file release-notes.md \
            main.js styles.css manifest.json

      - name: Create release with assets (auto-generated notes)
        if: steps.notes.outputs.have_notes != '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            main.js styles.css manifest.json
