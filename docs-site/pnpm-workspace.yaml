# Standalone pnpm workspace root for the docs site.
# Scopes this Docusaurus project away from the parent plugin workspace and is
# the supported home for overrides in pnpm v11+ (the package.json "pnpm" field
# is no longer read). Installed WITHOUT --ignore-workspace so these apply.

# core-js ships only a funding postinstall — explicitly skip it so pnpm v11
# does not abort the frozen CI install with ERR_PNPM_IGNORED_BUILDS.
allowBuilds:
  core-js: false
  core-js-pure: false
overrides:
  '@babel/plugin-transform-modules-systemjs@>=7.12.0 <=7.29.3': '7.29.4'
  'ajv@<6.14.0': '6.14.0'
  'ajv@>=7.0.0-alpha.0 <8.18.0': '8.18.0'
  'brace-expansion@<1.1.13': '1.1.14'
  'fast-uri@<=3.1.1': '3.1.2'
  'follow-redirects@<=1.15.11': '1.16.0'
  'js-yaml@<3.14.2': '3.14.2'
  'js-yaml@>=4.0.0 <4.1.1': '4.1.1'
  'lodash@<=4.17.23': '4.18.1'
  'mdast-util-to-hast@>=13.0.0 <13.2.1': '13.2.1'
  'minimatch@<3.1.4': '3.1.4'
  'node-forge@<1.4.0': '1.4.0'
  'path-to-regexp@<0.1.13': '0.1.13'
  'picomatch@<2.3.2': '2.3.2'
  'postcss@<8.5.10': '8.5.15'
  'qs@<6.14.2': '6.14.2'
  'serialize-javascript@<7.0.5': '7.0.5'
  'svgo@>=3.0.0 <3.3.3': '3.3.3'
  'undici@>=7.0.0 <7.24.0': '7.25.0'
  'webpack@>=5.49.0 <=5.104.0': '5.104.1'
  'webpack-dev-server@<=5.2.3': '5.2.4'
  'ws@>=8.0.0 <8.20.1': '8.20.1'
